<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Breakmap</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <nav>
      <button onclick="showPath('toprock')">Toprock</button>
      <button onclick="showPath('footwork')">Footwork</button>
    </nav>
    <div id="toprock" class="path"><svg viewBox="0 0 2000 2000" id="roadmap-toprock" style="width:100%; max-width:1200px; height:auto; display:block; margin:0 auto;"></svg></div>
    <div id="footwork" class="path" style="display: none"><svg viewBox="0 0 2000 2000" id="roadmap-footwork" style="width:100%; max-width:1200px; height:auto; display:block; margin:0 auto;"></svg></div>
    <script src="main.js"></script>
    <script src="toprock.js"></script>
    <script src="footwork.js"></script>
  </body>
</html>
